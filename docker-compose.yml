services:
  db:
    image: pgvector/pgvector:pg16
    container_name: aarogya_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aarogya
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_test_db.sql:/docker-entrypoint-initdb.d/01_init_test_db.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aarogya"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: aarogya_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/aarogya
      SYNC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/aarogya
      ALLOWED_HOSTS: '["localhost","127.0.0.1","api"]'
      ALLOWED_ORIGINS: '["http://localhost:3000"]'
      LOG_LEVEL: INFO
      LOG_FORMAT: CONSOLE
    ports:
      - "8000:8000"
    volumes:
      # Mount source for hot reload in development
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aarogya_frontend
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
    driver: local
