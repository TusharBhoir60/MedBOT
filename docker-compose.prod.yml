services:
  db:
    image: pgvector/pgvector:pg16
    container_name: aarogya_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-aarogya}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-aarogya}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    image: myregistry.com/aarogya/backend:latest
    container_name: aarogya_api_prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  postgres_data_prod:
    driver: local
