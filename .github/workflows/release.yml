name: Release Engineering

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: user/aarogya-backend:latest,user/aarogya-backend:${{ github.ref_name }}

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: user/aarogya-frontend:latest,user/aarogya-frontend:${{ github.ref_name }}

      - name: Generate Release Artifacts
        run: |
          echo "Generating CHANGELOG.md..."
          # Pseudo-command for changelog generation
          echo "# Changelog for ${{ github.ref_name }}" > CHANGELOG.md
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            CHANGELOG.md
            docker-compose.prod.yml
          generate_release_notes: true
